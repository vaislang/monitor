name: Monitor Reference Gates

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reference-gates:
    runs-on: macos-latest
    steps:
      - name: Check out monitor
        uses: actions/checkout@v4
        with:
          path: monitor

      - name: Check out Vais compiler
        uses: actions/checkout@v4
        with:
          repository: vaislang/vais
          path: vais

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 17
        run: |
          brew install llvm@17
          echo "LLVM_SYS_170_PREFIX=$(brew --prefix llvm@17)" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@17)/bin" >> "$GITHUB_PATH"

      - name: Build vaisc
        working-directory: vais
        run: cargo build --release -p vaisc

      - name: Run monitor reference gates
        working-directory: monitor
        env:
          VAIS_COMPILER_DIR: ${{ github.workspace }}/vais
        run: scripts/check-reference-gates.sh
